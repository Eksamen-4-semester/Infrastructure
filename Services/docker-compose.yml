services:
  auth-service:
    image: mortenstaunstrup/authservice-image:latest
    expose:
      - "8080"
    networks:
      - fitlife

  nginx:
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
    ports:
      - "4000:4000"
    networks:
      - fitlife


networks:
  fitlife:
    external: true